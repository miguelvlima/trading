name: Auto request review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
    branches:
      - develop

permissions:
  pull-requests: write
  contents: read

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Request review from the other collaborator
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const reviewersByAuthor = {
              miguelvlima: ["ncraveiroai"],
              ncraveiroai: ["miguelvlima"],
            };
            const reviewers = reviewersByAuthor[author];
            if (!reviewers) {
              core.info(`No automatic reviewer mapping for author ${author}.`);
              return;
            }
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers,
              });
            } catch (error) {
              core.info(`Review request skipped or already present: ${error.message}`);
            }

      - name: Enable auto-merge when approved
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.graphql(
                `mutation($id: ID!) {
                  enablePullRequestAutoMerge(input: {pullRequestId: $id, mergeMethod: MERGE}) {
                    pullRequest { number }
                  }
                }`,
                { id: context.payload.pull_request.node_id },
              );
            } catch (error) {
              core.info(`Auto-merge enable skipped: ${error.message}`);
            }
